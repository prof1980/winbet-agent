name: WinBet CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch dependency issues
    - cron: '0 6 * * 1'

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 py_compile

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit zero to not fail; warnings are OK
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Compile check
        run: |
          python -c "import py_compile; import os
          errors = 0
          for root, dirs, files in os.walk('execution'):
              for f in files:
                  if f.endswith('.py'):
                      try:
                          py_compile.compile(os.path.join(root, f), doraise=True)
                      except py_compile.PyCompileError as e:
                          print(f'SYNTAX ERROR in {f}: {e}')
                          errors += 1
          if errors > 0:
              raise SystemExit(f'{errors} syntax errors found')"

  test-imports:
    name: Test imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Test critical imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'execution')
          # Test che i moduli critici si importino senza errori
          try:
              import libero_notifier
              print('✅ libero_notifier')
          except Exception as e:
              print(f'⚠️  libero_notifier: {e}')
          try:
              import dedupe_matches
              print('✅ dedupe_matches')
          except Exception as e:
              print(f'⚠️  dedupe_matches: {e}')
          try:
              import winbet_daily_report
              print('✅ winbet_daily_report')
          except Exception as e:
              print(f'⚠️  winbet_daily_report: {e}')
          "

  structure-check:
    name: Repository structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify critical files
        run: |
          test -f README.md || (echo "❌ README.md mancante" && exit 1)
          test -f LICENSE || (echo "❌ LICENSE mancante" && exit 1)
          test -f requirements.txt || (echo "❌ requirements.txt mancante" && exit 1)
          test -f .gitignore || (echo "❌ .gitignore mancante" && exit 1)
          test -d execution || (echo "❌ execution/ mancante" && exit 1)
          test -d directives || (echo "❌ directives/ mancante" && exit 1)
          test -d skills || (echo "❌ skills/ mancante" && exit 1)
          echo "✅ Tutti i file critici presenti"

      - name: Verify no secrets
        run: |
          if [ -f .env ]; then
              echo "❌ ERRORE: .env committato!"
              exit 1
          fi
          if grep -r "GITHUB_PAT=" --include="*.py" --include="*.sh" --include="*.json" . 2>/dev/null; then
              echo "❌ ERRORE: GITHUB_PAT hardcoded trovato!"
              exit 1
          fi
          echo "✅ Nessun secret committato"
